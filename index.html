<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오버워치 내전 밸런스툴</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --accent: #f99e1a;
      --accent2: #3b9ddd;
      --tank: #4fc3f7;
      --dps: #ef5350;
      --support: #66bb6a;
      --text: #e6edf3;
      --text2: #8b949e;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 0 20px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--text2);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ─── 티어 점수 표 ─── */
    .tier-table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 20px;
    }

    .tier-table-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .tier-table-toggle h2 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text2);
    }

    .toggle-arrow {
      font-size: 0.75rem;
      color: var(--text2);
      transition: transform 0.2s;
    }

    .tier-table-toggle.open .toggle-arrow { transform: rotate(180deg); }

    .tier-table-body {
      display: none;
      margin-top: 12px;
    }

    .tier-table-body.open { display: block; }

    .tier-rows {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px;
    }

    .tier-row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border-radius: 6px;
      padding: 6px 12px;
    }

    .tier-row-score {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text2);
    }

    .tier-row-score span { color: var(--accent); }

    /* ─── 입력표 ─── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .table-head {
      display: grid;
      grid-template-columns: 36px 90px 1fr 160px;
      gap: 8px;
      padding: 0 10px 6px;
      color: var(--text2);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .player-input-row {
      display: grid;
      grid-template-columns: 36px 90px 1fr 160px;
      gap: 8px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      margin-bottom: 6px;
      transition: border-color 0.2s;
    }

    .player-input-row:last-child { margin-bottom: 0; }
    .player-input-row:focus-within { border-color: var(--accent); }

    .row-num {
      color: var(--text2);
      font-size: 0.82rem;
      font-weight: 700;
      text-align: center;
    }

    .role-fixed {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 5px 0;
    }

    .role-fixed.tank    { color: var(--tank); }
    .role-fixed.dps     { color: var(--dps); }
    .role-fixed.support { color: var(--support); }

    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.88rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.88rem;
      outline: none;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }

    /* ─── 버튼 ─── */
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-apply {
      background: var(--accent);
      color: #000;
    }
    .btn-apply:hover { background: #ffb340; transform: translateY(-1px); }

    .btn-balance {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1rem;
      padding: 12px 32px;
    }
    .btn-balance:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-balance:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 0.82rem;
      padding: 7px 14px;
    }
    .btn-clear:hover { border-color: #ef5350; color: #ef5350; }

    .btn-shuffle {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
      font-size: 0.82rem;
      padding: 7px 14px;
    }
    .btn-shuffle:hover { background: var(--accent2); color: #fff; }

    /* ─── 액션 바 ─── */
    .action-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    /* ─── 결과 ─── */
    .result-section { display: none; margin-bottom: 40px; }
    .result-section.show { display: block; }

    .result-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .result-header h2 { font-size: 1.25rem; font-weight: 800; }

    .score-diff {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--text2);
    }

    .score-diff b { color: var(--accent); }

    .swap-hint {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 14px;
    }

    .teams-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 580px) {
      .teams-grid { grid-template-columns: 1fr; }
      .table-head,
      .player-input-row {
        grid-template-columns: 30px 80px 1fr 130px;
      }
    }

    .team-card {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .team-card-header {
      padding: 12px 16px;
      font-weight: 800;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team1 .team-card-header {
      background: linear-gradient(135deg, #1a3a5c, #0d2137);
      border-bottom: 2px solid #3b9ddd;
    }

    .team2 .team-card-header {
      background: linear-gradient(135deg, #3a1a1a, #200d0d);
      border-bottom: 2px solid #ef5350;
    }

    .team1-label { color: #3b9ddd; }
    .team2-label { color: #ef5350; }

    .team-score { font-size: 0.82rem; color: var(--text2); font-weight: 400; }
    .team-score b { color: var(--text); }

    .team-members { padding: 10px; }

    .role-group { margin-bottom: 8px; }
    .role-group:last-child { margin-bottom: 0; }

    .role-group-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .role-group-label.tank    { color: var(--tank); }
    .role-group-label.dps     { color: var(--dps); }
    .role-group-label.support { color: var(--support); }

    .member-row {
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: 7px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .member-row:last-child { margin-bottom: 0; }

    .member-row:hover { border-color: var(--border); }

    .member-row.selected {
      border-color: var(--accent);
      background: rgba(249, 158, 26, 0.12);
    }

    .member-name { font-size: 0.88rem; font-weight: 600; }

    .member-tier {
      font-size: 0.73rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ─── 티어 배지 색상 ─── */
    .tier-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }

    .tier-bronze      { background: rgba(140,90,60,0.25);   color: #cd7f32; }
    .tier-silver      { background: rgba(160,160,180,0.2);  color: #b0b8c1; }
    .tier-gold        { background: rgba(255,200,0,0.2);    color: #ffd700; }
    .tier-platinum    { background: rgba(0,200,200,0.15);   color: #00c8c8; }
    .tier-diamond     { background: rgba(100,150,255,0.2);  color: #6eb5ff; }
    .tier-master      { background: rgba(200,100,255,0.2);  color: #c864ff; }
    .tier-grandmaster { background: rgba(255,80,80,0.2);    color: #ff6060; }
    .tier-champion    { background: rgba(255,165,0,0.25);   color: #ff9900; }

    /* ─── 경고 메시지 ─── */
    .warning-msg {
      background: rgba(255,160,0,0.1);
      border: 1px solid rgba(255,160,0,0.3);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 0.83rem;
      color: #ffb830;
      margin-bottom: 14px;
      text-align: center;
    }

    /* ─── 토스트 ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.86rem;
      color: var(--text);
      opacity: 0;
      transition: all 0.25s;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <header>
    <h1>⚔️ 오버워치 내전 밸런스툴</h1>
    <p>탱커 1 · 딜러 2 · 힐러 2 — 10명을 입력하면 팀을 자동으로 구성합니다</p>
  </header>

  <div class="container">

    <!-- 티어 점수 표 -->
    <div class="tier-table-section">
      <div class="tier-table-toggle" id="tierToggle" onclick="toggleTierTable()">
        <h2>📊 티어별 점수 보기</h2>
        <span class="toggle-arrow">▼</span>
      </div>
      <div class="tier-table-body" id="tierTableBody">
        <div class="tier-rows" id="tierRows"></div>
      </div>
    </div>

    <!-- 10명 입력표 -->
    <div class="input-card">
      <div class="card-header">
        <h2>참가자 입력표</h2>
        <button class="btn btn-apply" onclick="applyTable()">✓ 적용</button>
      </div>
      <div class="table-head">
        <div>#</div>
        <div>포지션</div>
        <div>닉네임</div>
        <div>티어</div>
      </div>
      <div id="inputRows"></div>
    </div>

    <!-- 액션 바 -->
    <div class="action-bar">
      <button class="btn btn-clear" onclick="clearTable()">초기화</button>
      <button class="btn btn-balance" id="balanceBtn" onclick="balanceTeams()" disabled>⚖️ 팀 구성하기</button>
      <button class="btn btn-shuffle" id="shuffleBtn" onclick="shuffleTeams()" disabled>🔀 다시 구성</button>
    </div>

    <!-- 결과 -->
    <div class="result-section" id="resultSection">
      <div class="result-header">
        <h2>🏆 팀 구성 결과</h2>
        <div class="score-diff" id="scoreDiff"></div>
      </div>
      <p class="swap-hint">선수를 클릭하면 하이라이트 → 다른 선수 클릭 시 팀 교체</p>
      <div id="warningMsg"></div>
      <div class="teams-grid" id="teamsGrid"></div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── 데이터 ───
    const TIER_SCORE = {
      bronze:      1,
      silver:      2,
      gold:        3,
      platinum:    4,
      diamond:     5,
      master:      7,
      grandmaster: 9,
      champion:    11,
    };

    const TIER_LABEL = {
      bronze:      '브론즈',
      silver:      '실버',
      gold:        '골드',
      platinum:    '플래티넘',
      diamond:     '다이아몬드',
      master:      '마스터',
      grandmaster: '그랜드마스터',
      champion:    '챔피언',
    };

    const TIER_CLASS = {
      bronze: 'bronze', silver: 'silver', gold: 'gold',
      platinum: 'platinum', diamond: 'diamond', master: 'master',
      grandmaster: 'grandmaster', champion: 'champion',
    };

    const ROLE_ICON  = { tank: '🛡️', dps: '⚔️', support: '💚' };
    const ROLE_LABEL = { tank: '탱커', dps: '딜러', support: '힐러' };

    // 포지션 고정 배치: 탱1 딜2 힐2 × 2팀 = 탱2 딜4 힐4
    const SLOT_ROLES = [
      'tank', 'tank',
      'dps', 'dps', 'dps', 'dps',
      'support', 'support', 'support', 'support',
    ];

    let players = [];          // 적용된 플레이어
    let lastTeams = null;
    let selectedSwap = null;   // 스왑 대기 중인 플레이어

    // ─── 입력표 렌더 ───
    function renderInputRows() {
      const tierOptions = Object.keys(TIER_SCORE).map(k =>
        `<option value="${k}">${TIER_LABEL[k]}</option>`
      ).join('');

      document.getElementById('inputRows').innerHTML = SLOT_ROLES.map((role, i) => `
        <div class="player-input-row">
          <div class="row-num">${i + 1}</div>
          <div class="role-fixed ${role}">${ROLE_ICON[role]} ${ROLE_LABEL[role]}</div>
          <input type="text" id="sName${i}" placeholder="닉네임" maxlength="30"
            onkeydown="if(event.key==='Enter')document.getElementById('sName${Math.min(i+1,9)}').focus()" />
          <select id="sTier${i}">${tierOptions}</select>
        </div>
      `).join('');
    }

    // ─── 적용 ───
    function applyTable() {
      const next = [];
      const seen = new Set();

      for (let i = 0; i < 10; i++) {
        const name = document.getElementById(`sName${i}`).value.trim();
        const tier = document.getElementById(`sTier${i}`).value;
        const role = SLOT_ROLES[i];

        if (!name) {
          showToast(`${i + 1}번 닉네임을 입력해주세요`);
          document.getElementById(`sName${i}`).focus();
          return;
        }

        if (seen.has(name.toLowerCase())) {
          showToast(`중복 닉네임: ${name}`);
          return;
        }

        seen.add(name.toLowerCase());
        next.push({ id: i, name, role, tier });
      }

      players = next;
      lastTeams = null;
      selectedSwap = null;
      document.getElementById('resultSection').classList.remove('show');
      updateButtons();
      showToast('적용 완료 — 팀 구성하기를 눌러주세요');
    }

    // ─── 초기화 ───
    function clearTable() {
      for (let i = 0; i < 10; i++) {
        document.getElementById(`sName${i}`).value = '';
        document.getElementById(`sTier${i}`).value = 'bronze';
      }
      players = [];
      lastTeams = null;
      selectedSwap = null;
      document.getElementById('resultSection').classList.remove('show');
      updateButtons();
      showToast('초기화 완료');
    }

    function updateButtons() {
      const ready = players.length === 10;
      document.getElementById('balanceBtn').disabled = !ready;
      document.getElementById('shuffleBtn').disabled = !lastTeams;
    }

    // ─── 밸런싱 ───
    function balanceTeams() {
      const tanks   = players.filter(p => p.role === 'tank');
      const dpsList = players.filter(p => p.role === 'dps');
      const sups    = players.filter(p => p.role === 'support');

      selectedSwap = null;
      lastTeams = assignBestSplit(tanks, dpsList, sups);
      renderResult(lastTeams);
      updateButtons();
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function shuffleTeams() {
      if (!lastTeams) return;
      const all     = [...lastTeams.team1, ...lastTeams.team2];
      const tanks   = all.filter(p => p.role === 'tank');
      const dpsList = all.filter(p => p.role === 'dps');
      const sups    = all.filter(p => p.role === 'support');
      selectedSwap = null;
      lastTeams = assignBestSplit(tanks, dpsList, sups);
      renderResult(lastTeams);
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function assignBestSplit(tanks, dps, sups) {
      let bestDiff = Infinity, best = null;

      for (const ts of getSplits(tanks, 1, 1))
        for (const ds of getSplits(dps, 2, 2))
          for (const ss of getSplits(sups, 2, 2)) {
            const t1 = [...ts[0], ...ds[0], ...ss[0]];
            const t2 = [...ts[1], ...ds[1], ...ss[1]];
            const d  = Math.abs(teamScore(t1) - teamScore(t2));
            if (d < bestDiff) { bestDiff = d; best = { team1: t1, team2: t2 }; }
          }

      return best;
    }

    function getSplits(arr, a) {
      return combinations(arr.length, a).map(idx => [
        idx.map(i => arr[i]),
        arr.filter((_, i) => !idx.includes(i)),
      ]);
    }

    function combinations(n, k) {
      const result = [], combo = [];
      (function go(start) {
        if (combo.length === k) { result.push([...combo]); return; }
        for (let i = start; i < n; i++) { combo.push(i); go(i + 1); combo.pop(); }
      })(0);
      return result;
    }

    function teamScore(members) {
      return members.reduce((s, p) => s + TIER_SCORE[p.tier], 0);
    }

    // ─── 결과 렌더 ───
    function renderResult(teams) {
      const { team1, team2 } = teams;
      const s1 = teamScore(team1), s2 = teamScore(team2);
      const diff = Math.abs(s1 - s2);

      document.getElementById('scoreDiff').innerHTML =
        `팀1 점수: <b>${s1}</b> &nbsp;·&nbsp; 팀2 점수: <b>${s2}</b> &nbsp;·&nbsp; 점수 차: <b>${diff}</b>`;

      const warnEl = document.getElementById('warningMsg');
      warnEl.innerHTML = diff > 8
        ? `<div class="warning-msg">⚠️ 점수 차가 ${diff}입니다. 🔀 다시 구성해보세요.</div>`
        : '';

      document.getElementById('teamsGrid').innerHTML =
        renderTeamCard(team1, 1, s1) + renderTeamCard(team2, 2, s2);

      document.getElementById('resultSection').classList.add('show');
    }

    function renderTeamCard(members, num, score) {
      const cls   = `team${num}`;
      const label = num === 1
        ? '<span class="team1-label">팀 1</span>'
        : '<span class="team2-label">팀 2</span>';

      const group = (role) => {
        const list = members.filter(p => p.role === role);
        return `
          <div class="role-group">
            <div class="role-group-label ${role}">${ROLE_ICON[role]} ${ROLE_LABEL[role]}</div>
            ${list.map(p => {
              const sel = selectedSwap && selectedSwap.id === p.id ? 'selected' : '';
              return `
                <div class="member-row ${sel}" onclick="handleSwapClick(${p.id})"
                     title="클릭해서 다른 선수와 팀 교체">
                  <span class="member-name">${escHtml(p.name)}</span>
                  <span class="member-tier tier-${TIER_CLASS[p.tier]}">${TIER_LABEL[p.tier]}</span>
                </div>`;
            }).join('')}
          </div>`;
      };

      return `
        <div class="team-card ${cls}">
          <div class="team-card-header">
            ${label}
            <span class="team-score">총점 <b>${score}</b></span>
          </div>
          <div class="team-members">
            ${group('tank')}${group('dps')}${group('support')}
          </div>
        </div>`;
    }

    // ─── 스왑 ───
    function handleSwapClick(id) {
      if (!lastTeams) return;

      const all = [...lastTeams.team1, ...lastTeams.team2];
      const clicked = all.find(p => p.id === id);
      if (!clicked) return;

      if (!selectedSwap) {
        selectedSwap = clicked;
        renderResult(lastTeams);
        showToast(`${clicked.name} 선택 — 바꿀 선수를 클릭하세요`);
        return;
      }

      if (selectedSwap.id === clicked.id) {
        selectedSwap = null;
        renderResult(lastTeams);
        showToast('선택 해제');
        return;
      }

      const name1 = selectedSwap.name, name2 = clicked.name;
      swapInTeams(selectedSwap.id, clicked.id);
      selectedSwap = null;
      renderResult(lastTeams);
      showToast(`${name1} ↔ ${name2} 교체 완료`);
    }

    function swapInTeams(id1, id2) {
      const find = id => {
        let i = lastTeams.team1.findIndex(p => p.id === id);
        if (i !== -1) return { arr: lastTeams.team1, i };
        i = lastTeams.team2.findIndex(p => p.id === id);
        return i !== -1 ? { arr: lastTeams.team2, i } : null;
      };

      const a = find(id1), b = find(id2);
      if (!a || !b) return;
      [a.arr[a.i], b.arr[b.i]] = [b.arr[b.i], a.arr[a.i]];
    }

    // ─── 티어 점수 표 ───
    function renderTierTable() {
      document.getElementById('tierRows').innerHTML = Object.keys(TIER_SCORE).map(k => `
        <div class="tier-row-item">
          <span class="tier-badge tier-${TIER_CLASS[k]}">${TIER_LABEL[k]}</span>
          <div class="tier-row-score">점수 <span>${TIER_SCORE[k]}</span></div>
        </div>
      `).join('');
    }

    function toggleTierTable() {
      document.getElementById('tierToggle').classList.toggle('open');
      document.getElementById('tierTableBody').classList.toggle('open');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ─── 초기화 ───
    renderTierTable();
    renderInputRows();
    updateButtons();
  </script>
</body>
</html>
